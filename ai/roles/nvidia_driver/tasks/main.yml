---
- name: Ensure GPU tooling packages are present
  ansible.builtin.apt:
    name:
      - pciutils
      - ubuntu-drivers-common
    state: present
    update_cache: true

- name: Detect NVIDIA GPU
  ansible.builtin.command: "lspci -d 10de:"
  register: nvidia_driver_gpus
  changed_when: false

- name: Assert an NVIDIA GPU is present
  ansible.builtin.assert:
    that:
      - nvidia_driver_gpus.stdout | trim | length > 0
    fail_msg: "No NVIDIA GPU found on this host (lspci -d 10de: returned nothing)."

- name: Check whether the NVIDIA driver is already working
  ansible.builtin.command: nvidia-smi
  register: nvidia_driver_smi
  changed_when: false
  failed_when: false

- name: Install NVIDIA driver
  when: nvidia_driver_smi.rc != 0
  block:
    - name: Install recommended NVIDIA server driver
      ansible.builtin.command: ubuntu-drivers install --gpgpu
      changed_when: true

    # The gpgpu profile installs the headless driver set only; nvidia-smi
    # lives in the matching nvidia-utils package (e.g. nvidia-utils-595-server
    # alongside nvidia-kernel-common-595-server).
    - name: Determine NVIDIA utilities package
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          dpkg-query -W -f '${Package}\n' 'nvidia-kernel-common-*'
          | head -1 | sed 's/kernel-common/utils/'
        executable: /bin/bash
      register: nvidia_driver_utils_pkg
      changed_when: false

    - name: Install NVIDIA utilities (nvidia-smi)
      ansible.builtin.apt:
        name: "{{ nvidia_driver_utils_pkg.stdout | trim }}"
        state: present

    - name: Check whether the NVIDIA kernel module is loaded
      ansible.builtin.stat:
        path: /sys/module/nvidia
      register: nvidia_driver_module

    - name: Reboot to load the NVIDIA driver
      ansible.builtin.reboot:
        reboot_timeout: "{{ nvidia_driver_reboot_timeout }}"
      when:
        - nvidia_driver_allow_reboot
        - not nvidia_driver_module.stat.exists

    - name: Verify the NVIDIA driver after installation
      ansible.builtin.command: nvidia-smi
      changed_when: false
