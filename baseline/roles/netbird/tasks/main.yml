---
- name: Ensure deb822_repository requirements are present
  ansible.builtin.apt:
    name: python3-debian
    state: present

- name: Install NetBird apt repository
  ansible.builtin.deb822_repository:
    name: netbird
    enabled: true
    state: present
    types: [deb]
    uris: "{{ netbird_repo_url }}"
    signed_by: "{{ netbird_repo_key_url }}"
    suites: [stable]
    components: [main]

- name: Install NetBird client
  ansible.builtin.apt:
    name: netbird
    state: "{{ netbird_package_state }}"
    update_cache: true

- name: Ensure NetBird service is running
  ansible.builtin.systemd:
    name: netbird
    enabled: "{{ netbird_service_enabled }}"
    state: "{{ netbird_service_state }}"

- name: Check NetBird daemon status
  ansible.builtin.command: netbird status
  register: netbird_status
  changed_when: false
  failed_when: false
  when: netbird_join

- name: Determine whether the peer needs enrollment
  ansible.builtin.set_fact:
    netbird_needs_login: >-
      {{ netbird_status.rc != 0
         or 'NeedsLogin' in netbird_status.stdout
         or 'LoginFailed' in netbird_status.stdout }}
  when: netbird_join

- name: Enroll peer with the management service
  when:
    - netbird_join
    - netbird_needs_login
  block:
    - name: Ensure a setup key is provided for enrollment
      ansible.builtin.assert:
        that:
          - netbird_setup_key | length > 0
        fail_msg: >-
          netbird_setup_key must be set (or NB_SETUP_KEY exported) to enroll
          this peer with the NetBird management service.

    # Catch value drift from the Semaphore Environment (wrong key, stray
    # whitespace/quotes) without exposing the secret. Quotes in the output
    # make leading/trailing whitespace visible.
    - name: Show enrollment parameters (setup key redacted)
      ansible.builtin.debug:
        msg: >-
          Enrolling with setup key
          '{{ netbird_setup_key[:2] }}...{{ netbird_setup_key[-2:] }}'
          (length {{ netbird_setup_key | length }}),
          management URL
          '{{ netbird_management_url if netbird_management_url | length > 0
              else '(client default: NetBird cloud)' }}'

    - name: Enroll peer with netbird up
      ansible.builtin.command:
        argv: >-
          {{ ['netbird', 'up', '--setup-key', netbird_setup_key]
             + (['--management-url', netbird_management_url]
                if netbird_management_url | length > 0 else [])
             + (['--allow-server-ssh'] if netbird_allow_ssh else [])
             + netbird_up_extra_args }}
      register: netbird_up_result
      no_log: true
      changed_when: true
      failed_when: false

    # The raw result stays no_log (the argv contains the setup key); surface
    # the error with the key redacted so failures are debuggable.
    - name: Report enrollment failure
      ansible.builtin.fail:
        msg: >-
          netbird up failed (rc={{ netbird_up_result.rc }}):
          {{ ((netbird_up_result.stderr | default('')) ~ ' ' ~ (netbird_up_result.stdout | default('')))
             | replace(netbird_setup_key, '***') | trim }}
      when: netbird_up_result.rc != 0

    - name: Verify management connection
      ansible.builtin.command: netbird status
      register: netbird_status_verify
      changed_when: false
      failed_when: "'Management: Connected' not in netbird_status_verify.stdout"
