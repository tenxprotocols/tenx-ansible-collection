---
# Repository setup mirrors NetBird's quickstart guide exactly (key dearmored
# to /usr/share/keyrings/netbird-archive-keyring.gpg, one-line entry in
# netbird.list), so hosts installed manually per the docs converge without
# conflicting apt sources.
- name: Ensure repository prerequisites are present
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
    state: present

- name: Download NetBird signing key (armored)
  ansible.builtin.get_url:
    url: "{{ netbird_repo_key_url }}"
    dest: "{{ netbird_keyring_path }}.asc"
    mode: '0644'

- name: Convert NetBird signing key to keyring
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor --output {{ netbird_keyring_path }} {{ netbird_keyring_path }}.asc
    creates: "{{ netbird_keyring_path }}"

# gpg writes the keyring 0600; apt verifies signatures sandboxed as _apt,
# which then can't read the key and the repo fails as "not signed".
- name: Ensure keyring is readable by apt
  ansible.builtin.file:
    path: "{{ netbird_keyring_path }}"
    owner: root
    group: root
    mode: '0644'

- name: Install NetBird apt repository (quickstart layout)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ netbird_keyring_path }}] {{ netbird_repo_url }} stable main"
    filename: netbird
    state: present

- name: Install NetBird client
  ansible.builtin.apt:
    name: netbird
    state: "{{ netbird_package_state }}"
    update_cache: true

- name: Ensure NetBird service is running
  ansible.builtin.systemd:
    name: netbird
    enabled: "{{ netbird_service_enabled }}"
    state: "{{ netbird_service_state }}"

- name: Check NetBird daemon status
  ansible.builtin.command: netbird status
  register: netbird_status
  changed_when: false
  failed_when: false
  when: netbird_join

- name: Determine whether the peer needs enrollment
  ansible.builtin.set_fact:
    netbird_needs_login: >-
      {{ netbird_status.rc != 0
         or 'NeedsLogin' in netbird_status.stdout
         or 'LoginFailed' in netbird_status.stdout }}
  when: netbird_join

- name: Enroll peer with the management service
  when:
    - netbird_join
    - netbird_needs_login
  block:
    - name: Ensure a setup key is provided for enrollment
      ansible.builtin.assert:
        that:
          - netbird_setup_key | length > 0
        fail_msg: >-
          netbird_setup_key must be set (or NB_SETUP_KEY exported) to enroll
          this peer with the NetBird management service.

    - name: Enroll peer with netbird up
      ansible.builtin.command:
        argv: >-
          {{ ['netbird', 'up', '--setup-key', netbird_setup_key]
             + (['--management-url', netbird_management_url]
                if netbird_management_url | length > 0 else [])
             + (['--allow-server-ssh'] if netbird_allow_ssh else [])
             + netbird_up_extra_args }}
      no_log: true
      changed_when: true

    - name: Verify management connection
      ansible.builtin.command: netbird status
      register: netbird_status_verify
      changed_when: false
      failed_when: "'Management: Connected' not in netbird_status_verify.stdout"
