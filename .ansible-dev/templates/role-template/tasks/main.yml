---
# Main tasks file for {{ROLE_NAME}} role

- name: Display role execution message
  ansible.builtin.debug:
    msg: "Executing {{ROLE_NAME}} role"

- name: Ensure role is enabled
  ansible.builtin.fail:
    msg: "{{ROLE_NAME}} role is disabled. Set {{ROLE_NAME}}_enabled: true to enable."
  when: not {{ROLE_NAME}}_enabled

